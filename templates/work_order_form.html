{% extends "base.html" %}
{% block content %}

<h2>{% if wo %}Edit{% else %}Add{% endif %} Work Order</h2>

<form method="post">

  <label>Title</label><br>
  <input type="text" name="title" value="{{ wo.title if wo else '' }}" required><br><br>

  <label>Road</label><br>
  <select name="road_id" required>
    {% for r in roads %}
      <option value="{{ r.id }}"
        {% if wo and wo.road_id == r.id %}selected{% endif %}>
        {{ r.name }} — {{ r.segment_name }}
      </option>
    {% endfor %}
  </select><br><br>

  <label>Status</label><br>
  <select name="status">
    <option {% if wo and wo.status=='Planned' %}selected{% endif %}>Planned</option>
    <option {% if wo and wo.status=='In Progress' %}selected{% endif %}>In Progress</option>
    <option {% if wo and wo.status=='Completed' %}selected{% endif %}>Completed</option>
  </select><br><br>

  <label>Planned Date</label><br>
  <input type="text" name="planned_date" value="{{ wo.planned_date if wo else '' }}"><br><br>

  <label>Completed Date</label><br>
  <input type="text" name="completed_date" value="{{ wo.completed_date if wo else '' }}"><br><br>

  <button type="submit">Save</button>

</form>

{% endblock %}
