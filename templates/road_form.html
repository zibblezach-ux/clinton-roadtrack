{% extends "base.html" %}
{% block content %}

<h2>{% if road %}Edit{% else %}Add{% endif %} Road</h2>

<form method="post">
  <label>Road Name</label><br>
  <input type="text" name="name" value="{{ road.name if road else '' }}" required><br><br>

  <label>Segment</label><br>
  <input type="text" name="segment_name" value="{{ road.segment_name if road else '' }}" required><br><br>

  <label>Condition</label><br>
  <select name="condition">
    <option {% if road and road.condition=='Good' %}selected{% endif %}>Good</option>
    <option {% if road and road.condition=='Fair' %}selected{% endif %}>Fair</option>
    <option {% if road and road.condition=='Poor' %}selected{% endif %}>Poor</option>
  </select><br><br>

  <label>Traffic Level</label><br>
  <select name="traffic_level">
    <option {% if road and road.traffic_level=='Low' %}selected{% endif %}>Low</option>
    <option {% if road and road.traffic_level=='Medium' %}selected{% endif %}>Medium</option>
    <option {% if road and road.traffic_level=='High' %}selected{% endif %}>High</option>
  </select><br><br>

  <button type="submit">Save</button>
</form>

{% endblock %}
