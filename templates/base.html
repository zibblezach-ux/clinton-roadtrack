<!DOCTYPE html>
<html>
<head>
  <title>Clinton RoadTrack</title>
  <style>
    body { font-family: Arial; margin: 0; background: #f4f8fb; }
    header { background: #0b3d73; color: white; padding: 14px; }
    nav a { color: white; margin-right: 15px; text-decoration: none; font-weight: bold; }
    nav a:hover { text-decoration: underline; }

    .container { max-width: 1100px; margin: 20px auto; padding: 20px; }

    table { width: 100%; border-collapse: collapse; background: white; }
    th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }

    .btn { background: #0b3d73; color: white; padding: 8px 12px; border-radius: 6px; text-decoration: none; }
    .btn.secondary { background: #777; }

    h2 { margin-top: 0; }
  </style>
</head>

<body>

<header>
  <h1>Clinton RoadTrack</h1>
  <nav>
    <a href="{{ url_for('dashboard') }}">Dashboard</a>
    <a href="{{ url_for('roads') }}">Roads</a>
    <a href="{{ url_for('work_orders') }}">Work Orders</a>
    <a href="{{ url_for('public') }}">Public View</a>
  </nav>
</header>

<div class="container">
  {% block content %}{% endblock %}
</div>

</body>
</html>
