<!DOCTYPE html>
<html>
<head>
  <title>Clinton RoadTrack</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f8fb;
    }

    header {
      background: #0b3d73;
      color: white;
      padding: 15px;
    }

    nav a {
      color: white;
      margin-right: 15px;
      text-decoration: none;
      font-weight: bold;
    }

    .container {
      max-width: 1000px;
      margin: 20px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th {
      background: #eaf2fb;
      padding: 8px;
      text-align: left;
    }

    td {
      padding: 8px;
      border-bottom: 1px solid #ddd;
    }

    h2, h3 {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1>Clinton RoadTrack</h1>
  <nav>
    <a href="/">Dashboard</a>
    <a href="/roads">Roads</a>
    <a href="/work-orders">Work Orders</a>
    <a href="/public">Public View</a>
  </nav>
</header>

<div class="container">
  {% block content %}{% endblock %}
</div>

</body>
</html>
