<!DOCTYPE html>
<html>
<head>
  <title>Clinton RoadTrack</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f8fb;
      color: #123;
    }

    header {
      background: #0b3d73;
      color: white;
      padding: 16px;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    nav {
      margin-top: 8px;
    }

    nav a {
      color: white;
      margin-right: 18px;
      text-decoration: none;
      font-weight: bold;
      font-size: 14px;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .container {
      max-width: 1100px;
      margin: 25px auto;
      padding: 20px;
      background: white;
      border-radius: 14px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    }

    h2, h3 {
      margin-top: 0;
      color: #0b3d73;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th {
      background: #eaf2fb;
      text-align: left;
      padding: 10px;
      font-size: 14px;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      font-size: 14px;
    }

    tr:hover {
      background: #f9fbff;
    }

    .btn {
      background: #0b3d73;
      color: white;
      padding: 8px 14px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 13px;
    }

    .btn.secondary {
      background: #777;
    }

    .notice {
      background: #fff3cd;
      padding: 14px;
      border-radius: 10px;
      margin-bottom: 20px;
      border-left: 5px solid #ffc107;
      font-size: 14px;
    }

    .info {
      background: #eaf2fb;
      padding: 14px;
      border-radius: 10px;
      margin: 20px 0;
      font-size: 14px;
    }

    .warning {
      background: #fdecea;
      padding: 14px;
      border-radius: 10px;
      margin-top: 20px;
      border-left: 5px solid #d32f2f;
      font-size: 14px;
    }

    .muted {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 10px;
      margin-top: 20px;
      font-size: 13px;
      color: #555;
    }

  </style>
</head>

<body>

<header>
  <h1>Clinton RoadTrack</h1>
  <nav>
    <a href="{{ url_for('dashboard') }}">Dashboard</a>
    <a href="{{ url_for('roads') }}">Roads</a>
    <a href="{{ url_for('work_orders') }}">Work Orders</a>
    <a href="{{ url_for('public') }}">Public View</a>
  </nav>
</header>

<div class="container">
  {% block content %}{% endblock %}
</div>

</body>
</html>
