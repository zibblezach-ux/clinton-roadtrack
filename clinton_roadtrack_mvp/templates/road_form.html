{% extends "base.html" %}
{% block content %}
<h2>{{ "Edit" if road else "Add" }} Road Segment</h2>
<form method="post" class="form">
  <label>Road name <input name="name" required value="{{ road.name if road else '' }}"></label>
  <label>Segment name <input name="segment_name" required value="{{ road.segment_name if road else '' }}"></label>
  <label>Start point <input name="start_point" value="{{ road.start_point if road else '' }}"></label>
  <label>End point <input name="end_point" value="{{ road.end_point if road else '' }}"></label>
  <label>Surface type <select name="surface_type">
    {% for x in ["Gravel","Chip seal","Asphalt","Concrete","Dirt"] %}<option {% if road and road.surface_type==x %}selected{% endif %}>{{x}}</option>{% endfor %}
  </select></label>
  <label>Length miles <input type="number" step="0.01" name="length_miles" value="{{ road.length_miles if road else 0 }}"></label>
  <label>Traffic level <select name="traffic_level">
    {% for x in ["High","Medium","Low"] %}<option {% if road and road.traffic_level==x %}selected{% endif %}>{{x}}</option>{% endfor %}
  </select></label>
  <label>Importance <input name="importance" placeholder="school route, emergency access, farm access..." value="{{ road.importance if road else '' }}"></label>
  <label>Condition <select name="condition">
    {% for x in ["Good","Fair","Poor"] %}<option {% if road and road.condition==x %}selected{% endif %}>{{x}}</option>{% endfor %}
  </select></label>
  <label>Last inspected <input type="date" name="last_inspected" value="{{ road.last_inspected if road else '' }}"></label>
  <label>Notes <textarea name="notes">{{ road.notes if road else '' }}</textarea></label>
  <button class="btn">Save</button>
</form>
{% endblock %}
